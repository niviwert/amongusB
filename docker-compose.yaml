version: '3'
networks:
  dem:

services:

  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: bamba_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/__init__.py:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dem

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin
      PGADMIN_LISTEN_PORT: 80

    ports:
      - "5000:80"

    depends_on:
      - postgres
    networks:
      - dem
  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/postgres_python
    depends_on:
      - postgres
    networks:
      - dem